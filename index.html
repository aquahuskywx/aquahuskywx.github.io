<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aqua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @font-face {
      font-family: 'DSEG7';
      src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #090b10;
      --surface:     #0e1117;
      --surface2:    #141820;
      --border:      rgba(255,255,255,0.07);
      --border-nav:  rgba(255,255,255,0.08);
      --text:        #e8eaf0;
      --text-muted:  #6b7280;
      --text-dim:    #3d4451;
      --a0:          138,92,246;
      --accent:      rgb(var(--a0));
      --accent2:     color-mix(in srgb, rgb(var(--a0)) 70%, white);
      --accent-glow: rgba(var(--a0),0.15);
      --nixie-warm:  #ff8c42;
      --nixie-glow:  #ff6b1a;
      --nixie-core:  #fff3e0;
      --weather-ok:  #34d399;
      --font-ui:     'Work Sans', BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono:   'JetBrains Mono', "SF Mono", Menlo, "Cascadia Mono", monospace;
      --bg-image:    none;
      --nav-bg:      rgba(9,11,16,0.55);
      --card-bg:     #0e1117;
    }

    /* ─── LIGHT MODE ─── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f0f2f7;
        --surface:    rgba(255,255,255,0.75);
        --surface2:   rgba(240,242,247,0.8);
        --border:     rgba(0,0,0,0.08);
        --border-nav: rgba(0,0,0,0.07);
        --text:       #1a1d27;
        --text-muted: #6b7280;
        --text-dim:   #9ca3af;
        --weather-ok: #059669;
        --bg-image:   none;
        --nav-bg:     rgba(240,242,247,0.6);
        --card-bg:    rgba(255,255,255,0.75);
      }
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow-x: hidden;
    }


    /* ─── BACKGROUND IMAGE LAYER — set by JS via <img> preload trick ─── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 0.6s ease;
      opacity: 0;
    }
    #bg-layer.loaded { opacity: 1; }

    /* ─── BG OVERLAY — darkens image for readability ─── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
      opacity: 0.68;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    @media (prefers-color-scheme: light) {
      body::after { opacity: 0.55; }
    }

    /* ─── GRAIN OVERLAY ─── */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      background-image: url('https://raw.githubusercontent.com/aquahuskywx/killme/main/public/noise.svg');
      background-size: 0.75%;
      background-repeat: repeat;
      opacity: 0.4;
      pointer-events: none;
    }
    @media (prefers-color-scheme: light) {
      .grain {
        background-image: url('https://raw.githubusercontent.com/aquahuskywx/killme/main/public/noiselight.png');
        opacity: 0.5;
      }
    }

    /* ─── AURORA BG ─── */
    .aurora {
      position: fixed; inset: 0; z-index: 2; overflow: hidden;
      pointer-events: none;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .aurora-blob:nth-child(1) {
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(var(--a0),0.5), transparent 70%);
      top: -150px; left: -200px;
      animation-duration: 20s;
      transition: background 1.2s ease;
    }
    .aurora-blob:nth-child(2) {
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(var(--a0),0.4), transparent 70%);
      bottom: -200px; right: -150px;
      animation-duration: 25s; animation-direction: alternate-reverse;
      transition: background 1.2s ease;
    }
    .aurora-blob:nth-child(3) {
      width: 400px; height: 300px;
      background: radial-gradient(ellipse, rgba(var(--a0),0.25), transparent 70%);
      top: 40%; left: 50%;
      animation-duration: 30s;
      opacity: 0.08;
      transition: background 1.2s ease;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ─── LAYOUT ─── */
    .page {
      position: relative; z-index: 3;
      max-width: 900px;
      margin: 0 auto;
      padding: 72px 24px 48px;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
      animation: fadeDown 0.8s ease both;
    }
    .wordmark {
      display: flex; flex-direction: column; gap: 2px;
    }
    .wordmark-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .wordmark-studio {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--weather-ok);
      box-shadow: 0 0 8px var(--weather-ok);
      animation: pulse-dot 2.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ─── HERO GRID ─── */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) {
      .hero { grid-template-columns: 1fr; }
    }

    /* ─── NAV BAR ─── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      height: 48px;
      background: var(--nav-bg);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid var(--border-nav);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      transition: background 0.4s ease;
    }
    .nav-wordmark {
      display: flex;
      align-items: center;
    }
    .nav-links {
      display: flex; align-items: center; gap: 4px;
    }
    .nav-link {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid transparent;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .nav-link:hover {
      color: var(--accent);
      border-color: var(--border);
      background: rgba(var(--a0),0.08);
    }
    .nav-link svg {
      width: 16px; height: 16px;
      fill: currentColor;
    }

    /* ─── CARD BASE ─── */
    .card {
      background: rgba(14,17,23,0.55);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }
    @media (prefers-color-scheme: light) {
      .card {
        background: rgba(255,255,255,0.45);
        border: 1px solid rgba(255,255,255,0.6);
      }
      .card:hover { border-color: rgba(255,255,255,0.8); }
    }
    .card-label {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    /* ─── LCD CLOCK ─── */
    .card-clock {
      grid-column: 1 / -1;
      animation: fadeUp 0.9s 0.1s ease both;
      background: rgba(14,17,23,0.55);
      transition: background 1.2s ease;
    }
    @media (prefers-color-scheme: light) {
      .card-clock { background: rgba(255,255,255,0.45); }
    }

    /* Outer LCD panel strip */
    .lcd-panel {
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(var(--a0),0.15);
      border-radius: 8px;
      padding: 16px 24px;
      margin: 4px 0 8px;
      gap: 0;
      overflow: hidden;
      transition: border-color 1.2s ease;
    }
    @media (prefers-color-scheme: light) {
      .lcd-panel {
        background: rgba(0,0,0,0.7);
        border-color: rgba(var(--a0),0.25);
      }
    }

    /* Digit pair group */
    .lcd-group {
      display: flex;
      gap: 2px;
    }

    /* Single digit cell */
    .lcd-digit {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
    }
    /* Ghost "8" — dim inactive segments */
    .lcd-ghost {
      position: absolute;
      font-family: 'DSEG7', var(--font-mono);
      font-size: 64px;
      font-weight: normal;
      line-height: 1;
      color: rgb(var(--a0));
      opacity: 0.07;
      user-select: none;
      pointer-events: none;
      transition: color 1.2s ease;
    }
    /* Active digit */
    .lcd-num {
      font-family: 'DSEG7', var(--font-mono);
      font-size: 64px;
      font-weight: normal;
      line-height: 1;
      color: rgb(var(--a0));
      text-shadow: 0 0 12px rgba(var(--a0),0.5);
      position: relative; z-index: 1;
      transition: opacity 0.06s ease, color 1.2s ease, text-shadow 1.2s ease;
    }

    /* Colon separator */
    .lcd-colon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 4px 6px;
    }
    .lcd-colon span {
      display: block;
      width: 6px; height: 6px;
      border-radius: 1px;
      background: rgb(var(--a0));
      transition: background 1.2s ease;
    }


    /* Divider between groups (H:M | M:S) */
    .lcd-spacer {
      width: 1px;
      background: rgba(var(--a0),0.1);
      margin: 0 16px;
      transition: background 1.2s ease;
    }

    /* Sub-row: date / day / tz */
    .nixie-sub {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nixie-sub-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nixie-sub-val {
      color: var(--text);
      font-size: 13px;
    }

    /* ─── WEATHER CARD ─── */
    .card-weather {
      animation: fadeUp 0.9s 0.2s ease both;
    }
    .card-weather > * { position: relative; z-index: 1; }
    .weather-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      position: relative;
      min-height: 144px;
    }
    .weather-temp-block {}
    .weather-temp {
      font-size: 72px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "zero" 1;
    }
    .weather-temp sup {
      font-size: 24px;
      vertical-align: super;
      color: var(--text-muted);
      font-weight: 300;
    }
    .weather-feel {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-top: 4px;
    }
    .weather-icon-area {
      position: absolute;
      top: 0;
      right: 0;
      width: 144px; height: 144px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 16px rgba(var(--a0),0.3));
      transition: filter 1.2s ease;
    }
    .weather-icon-area img {
      width: 100%; height: 100%;
    }
    .weather-desc {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: capitalize;
      margin-bottom: 16px;
    }
    .weather-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .weather-stat {
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .weather-stat-label {
      font-size: 9px;
      font-family: var(--font-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .weather-stat-val {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      font-family: var(--font-mono);
    }
    .weather-location {
      display: flex; align-items: center; gap: 6px;
      margin-top: 14px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }
    .weather-location svg { flex-shrink: 0; }
    .weather-loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 180px;
      gap: 12px;
      color: var(--text-muted);
      font-size: 13px;
      font-family: var(--font-mono);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .weather-error {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 180px; gap: 8px;
      color: var(--text-muted); font-family: var(--font-mono); font-size: 12px;
      text-align: center;
    }
    .weather-error-icon { font-size: 32px; }

    /* ─── INFO CARD (right column, lower) ─── */
    .card-info {
      animation: fadeUp 0.9s 0.3s ease both;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .info-greeting {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .info-headline {
      font-size: 26px;
      font-weight: 300;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 16px;
    }
    .info-headline strong {
      color: var(--accent);
      font-weight: 500;
    }
    .info-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: auto;
    }
    .tag {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 9px;
      transition: border-color 0.2s, color 0.2s;
    }
    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      cursor: default;
    }

    /* ─── LOWER GRID ─── */
    .lower {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      animation: fadeUp 0.9s 0.4s ease both;
    }
    @media (max-width: 640px) {
      .lower { grid-template-columns: 1fr; }
    }

    /* ─── ALERT BANNER ─── */
    /* severity color vars — overridden per-banner via inline style */
    .alert-banner {
      --ac: 148, 163, 184;  /* default: slate-blue */
      grid-column: 1 / -1;
      display: none;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 12px;
      border-left: 3px solid rgb(var(--ac));
      background: rgba(var(--ac), 0.07);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border-top: 1px solid rgba(var(--ac), 0.15);
      border-right: 1px solid rgba(var(--ac), 0.08);
      border-bottom: 1px solid rgba(var(--ac), 0.08);
      font-size: 12px;
      font-family: var(--font-mono);
      color: rgb(var(--ac));
      line-height: 1.5;
      animation: fadeUp 0.5s ease both;
    }
    .alert-banner.show { display: flex; }
    .alert-icon {
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: flex-start;
    }
    .alert-icon svg {
      width: 16px; height: 16px;
      stroke: currentColor;
      flex-shrink: 0;
    }
    .alert-title { font-weight: 500; margin-bottom: 2px; color: rgb(var(--ac)); filter: brightness(1.2); }
    .alert-body { color: rgba(var(--ac), 0.65); font-size: 11px; }
    .alert-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(var(--ac), 0.4);
      transition: border-color 0.15s;
    }
    .alert-link:hover { border-bottom-color: rgb(var(--ac)); }

    /* ─── FORECAST STRIP ─── */
    .card-forecast {
      grid-column: 1 / -1;
      padding: 20px 24px;
    }
    .forecast-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .forecast-day {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 8px;
      background: var(--surface2);
      border-radius: 10px;
      font-family: var(--font-mono);
      transition: background 0.2s;
    }
    .forecast-day:hover { background: rgba(255,255,255,0.05); }
    .forecast-day-name {
      font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .forecast-icon { font-size: 22px; }
    .forecast-hi { font-size: 14px; font-weight: 500; color: var(--text); }
    .forecast-lo { font-size: 11px; color: var(--text-muted); }
    .forecast-loading {
      display: flex; align-items: center; justify-content: center;
      height: 80px; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px;
      gap: 10px;
    }

    /* ─── FOOTER BAR ─── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 10px 24px;
      background: rgba(9,11,16,0.7);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      letter-spacing: 0.08em;
      animation: fadeUp 0.9s 0.5s ease both;
    }
    .footer-credits {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-credit {
      display: flex; align-items: center; gap: 5px;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-credit:hover { color: var(--accent); }
    .footer-sep {
      color: var(--text-dim);
      opacity: 0.3;
    }
    @media (prefers-color-scheme: light) {
      footer { background: rgba(240,242,247,0.75); border-top-color: rgba(0,0,0,0.08); }
    }

    /* ─── ALERT DEMO PANEL ─── */
    .demo-panel {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(9,11,16,0.85);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
      min-width: 340px;
      max-width: 520px;
      width: calc(100vw - 48px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: fadeUp 0.2s ease both;
    }
    .demo-panel.open { display: flex; }
    .demo-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .demo-panel-label {
      font-size: 9px;
      font-family: var(--font-mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .demo-panel-close {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .demo-panel-close:hover { color: var(--text); }
    .demo-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .demo-select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 8px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
      letter-spacing: 0.03em;
    }
    .demo-select:focus { border-color: rgba(var(--a0),0.5); }
    .demo-select option, .demo-select optgroup { background: #0e1117; }
    .demo-btn {
      background: rgba(var(--a0),0.12);
      border: 1px solid rgba(var(--a0),0.35);
      border-radius: 8px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 8px 14px;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .demo-btn:hover { background: rgba(var(--a0),0.22); }
    .demo-btn-clear {
      background: transparent;
      border-color: var(--border);
      color: var(--text-muted);
    }
    .demo-btn-clear:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: transparent; }

    /* Toggle button in footer */
    #demo-toggle {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
      display: none;
      align-items: center;
      gap: 5px;
    }
    #demo-toggle:hover { color: var(--accent); }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── CARD NOISE TEXTURE ─── */
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url('https://raw.githubusercontent.com/aquahuskywx/killme/main/public/noise.svg');
      background-size: 120px;
      background-repeat: repeat;
      opacity: 0.025;
      pointer-events: none;
      border-radius: inherit;
      z-index: 0;
    }
    @media (prefers-color-scheme: light) {
      .card::before {
        background-image: url('https://raw.githubusercontent.com/aquahuskywx/killme/main/public/noiselight.png');
        opacity: 0.04;
      }
    }
    /* ─── ACCENT LINE ─── */
    .card::after {
      content: '';
      position: absolute; top: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>

<script>
/* ════════════════════════════════════
   NIXIE CLOCK
════════════════════════════════════ */
const days  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months= ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function setDigit(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.textContent !== val) el.textContent = val;
}

const colons = document.querySelectorAll('.lcd-colon');

function tickClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  setDigit('h1', h[0]); setDigit('h2', h[1]);
  setDigit('m1', m[0]); setDigit('m2', m[1]);
  setDigit('s1', s[0]); setDigit('s2', s[1]);

  // Colons: on during even seconds, off during odd — synced to the tick
  const colonOn = now.getSeconds() % 2 === 0;
  colons.forEach(c => c.style.opacity = colonOn ? '1' : '0.12');

  document.getElementById('clock-date').textContent =
    `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('clock-day').textContent  = days[now.getDay()];

  const tzName = Intl.DateTimeFormat().resolvedOptions().timeZone
    .split('/').pop().replace(/_/g,' ');
  document.getElementById('clock-tz').textContent = tzName;
}
tickClock();
setInterval(tickClock, 1000);


/* ════════════════════════════════════
   WEATHER (NWS — no API key required)
════════════════════════════════════ */
const MC = 'https://cdn.jsdelivr.net/gh/basmilius/weather-icons@dev/production/fill/svg/';

function isDay() {
  const h = new Date().getHours();
  return h >= 6 && h < 20;
}

function mcIcon(name) {
  return `<img src="${MC}${name}.svg" alt="${name}" style="width:128px;height:128px;" />`;
}

function wmoToMeteocon(code) {
  const day = isDay();
  const dn = day ? 'day' : 'night';
  const map = {
    0:  day ? 'clear-day'              : 'clear-night',
    1:  day ? 'mostly-clear-day'       : 'mostly-clear-night',
    2:  day ? 'partly-cloudy-day'      : 'partly-cloudy-night',
    3:  'overcast',
    45: 'fog',
    48: 'fog',
    51: day ? 'drizzle'                : 'drizzle',
    53: 'drizzle',
    55: 'drizzle',
    61: day ? 'rain'                   : 'rain',
    63: 'rain',
    65: 'rain',
    71: day ? 'snow'                   : 'snow',
    73: 'snow',
    75: 'snow',
    77: 'snow',
    80: day ? 'partly-cloudy-day-rain' : 'partly-cloudy-night-rain',
    81: 'rain',
    82: 'rain',
    85: day ? 'partly-cloudy-day-snow' : 'partly-cloudy-night-snow',
    86: 'snow',
    95: day ? 'thunderstorms-day'      : 'thunderstorms-night',
    96: day ? 'thunderstorms-day-rain' : 'thunderstorms-night-rain',
    99: day ? 'thunderstorms-day-rain' : 'thunderstorms-night-rain',
  };
  return map[code] || 'not-available';
}
const WMO_DESC = {
  0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Fog', 48:'Icy fog',
  51:'Light drizzle', 53:'Moderate drizzle', 55:'Dense drizzle',
  61:'Slight rain', 63:'Moderate rain', 65:'Heavy rain',
  71:'Slight snow', 73:'Moderate snow', 75:'Heavy snow',
  77:'Snow grains', 80:'Slight showers', 81:'Moderate showers', 82:'Violent showers',
  85:'Slight snow showers', 86:'Heavy snow showers',
  95:'Thunderstorm', 96:'Thunderstorm + hail', 99:'Thunderstorm + heavy hail',
};

function fToC(f) { return ((f - 32) * 5 / 9).toFixed(0); }
function cToF(c) { return (c * 9 / 5 + 32).toFixed(0); }
function mphToKmh(m) { return (m * 1.609).toFixed(0); }

function windDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m` +
    `&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;

  const r = await fetch(url);
  if (!r.ok) throw new Error('weather fetch failed');
  return r.json();
}

async function fetchNWSAlerts(lat, lon) {
  try {
    const r = await fetch(`https://api.weather.gov/alerts/active?point=${lat.toFixed(4)},${lon.toFixed(4)}`);
    if (!r.ok) return [];
    const d = await r.json();
    return d.features || [];
  } catch { return []; }
}

function renderWeather(data) {
  const c = data.current;
  const code = c.weather_code;
  const icon = mcIcon(wmoToMeteocon(code));
  const desc = WMO_DESC[code]  || 'Unknown';
  const temp  = Math.round(c.temperature_2m);
  const feel  = Math.round(c.apparent_temperature);
  const hum   = c.relative_humidity_2m;
  const wspd  = Math.round(c.wind_speed_10m);
  const wdir  = windDir(c.wind_direction_10m);

  document.getElementById('weather-content').innerHTML = `
    <div class="weather-main">
      <div class="weather-temp-block">
        <div class="weather-temp">${temp}<sup>°F</sup></div>
        <div class="weather-feel">Feels like ${feel}°F</div>
      </div>
      <div class="weather-icon-area">${icon}</div>
    </div>
    <div class="weather-desc">${desc}</div>
    <div class="weather-row">
      <div class="weather-stat">
        <div class="weather-stat-label">Humidity</div>
        <div class="weather-stat-val">${hum}%</div>
      </div>
      <div class="weather-stat">
        <div class="weather-stat-label">Wind</div>
        <div class="weather-stat-val">${wdir} ${wspd} mph</div>
      </div>
    </div>
    <div class="weather-location">
      <svg width="10" height="13" viewBox="0 0 10 13" fill="none">
        <path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 8 5 8s5-4.25 5-8c0-2.76-2.24-5-5-5zm0 6.5A1.5 1.5 0 1 1 5 3.5a1.5 1.5 0 0 1 0 3z" fill="currentColor"/>
      </svg>
      Arizona, USA
    </div>
  `;
  document.getElementById('updated-at').textContent =
    `weather updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
}

function alertArticle(eventName) {
  const vowels = ['A','E','I','O','U'];
  return vowels.includes(eventName.trim()[0].toUpperCase()) ? 'an' : 'a';
}

let lastRealAlerts = [];
let demoAlerts = [];
let knownAlertIds = new Set();

/* ── Severity rank — higher = more urgent ── */
function severityRank(event, severity) {
  const e = (event || '').toLowerCase();
  const s = (severity || '').toLowerCase();
  if (/emergency|asteroid|nuclear|civil emergency|amber|shelter.?in.?place|evacuation immediate/.test(e)) return 5;
  if (s === 'extreme' || /pds|tornado warning|tornado emergency|flash flood emergency/.test(e)) return 4;
  if (s === 'severe' || /warning/.test(e)) return 3;
  if (s === 'moderate' || /watch/.test(e)) return 2;
  if (/advisory/.test(e)) return 1;
  return 0;
}

function alertIcon(event, severity) {
  const e = (event || '').toLowerCase();
  const s = (severity || '').toLowerCase();
  if (/emergency|asteroid|nuclear|civil emergency|amber|shelter.?in.?place|evacuation immediate/.test(e))
    return '<i data-lucide="alert-octagon"></i>';
  if (s === 'extreme' || s === 'severe' || /warning/.test(e))
    return '<i data-lucide="alert-triangle"></i>';
  if (s === 'moderate' || /watch|advisory/.test(e))
    return '<i data-lucide="alert-circle"></i>';
  return '<i data-lucide="info"></i>';
}

function alertColor(event, severity) {
  const e = (event || '').toLowerCase();
  const s = (severity || '').toLowerCase();
  if (/emergency|asteroid|nuclear|civil emergency|amber|shelter.?in.?place|evacuation immediate/.test(e))
    return '236, 72, 153';
  if (s === 'extreme' || /pds|tornado warning|tornado emergency|flash flood emergency|extreme/.test(e))
    return '239, 68, 68';
  if (s === 'severe' || /warning/.test(e))
    return '249, 115, 22';
  if (s === 'moderate' || /watch|advisory/.test(e))
    return '234, 179, 8';
  return '148, 163, 184';
}

/* ── Iowa State mesonet VTEC link from NWS alert id ── */
function alertLink(props) {
  // NWS alert id looks like: https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.XXXXX
  // The @id field is the direct NWS product URL
  const nwsUrl = props['@id'] || props.id || null;

  // Try to extract a VTEC mesonet link from the VTEC string in the description
  const vtec = (props.parameters && props.parameters.VTEC && props.parameters.VTEC[0]) || '';
  // VTEC format: /O.NEW.KXXX.TO.W.0001.250405T0000Z-250405T0600Z/
  const vtecMatch = vtec.match(/\/[A-Z]\.([A-Z]+)\.([A-Z]{4})\.([A-Z]{2})\.([A-Z])\.(\d{4})\./);
  if (vtecMatch) {
    const [, action, wfo, phen, sig, etn] = vtecMatch;
    const year = new Date().getFullYear();
    return `https://mesonet.agron.iastate.edu/vtec/#${year}-O-${action}-${wfo}-${phen}-${sig}-${String(etn).padStart(4,'0')}`;
  }

  // Fall back to NWS product page
  return nwsUrl;
}

/* ── EAS-style attention tone via Web Audio ── */
const alertAudio = new Audio('../assets/alertbot.mp3');
alertAudio.volume = 0.8;

function playAlertTone() {
  try {
    alertAudio.currentTime = 0;
    alertAudio.play().catch(() => { /* autoplay blocked — silent */ });
  } catch(e) { /* silent */ }
}

function renderAlerts(alerts, playSound = false) {
  const container = document.getElementById('alert-container');
  if (!alerts.length) { container.innerHTML = ''; return; }

  // Sort by severity rank descending
  const sorted = [...alerts].sort((a, b) => {
    const ap = a.properties || {};
    const bp = b.properties || {};
    return severityRank(bp.event, bp.severity) - severityRank(ap.event, ap.severity);
  });

  container.innerHTML = sorted.map(a => {
    const props = a.properties;
    const event = props.event || 'Weather Alert';
    const severity = props.severity || '';
    const article = alertArticle(event);
    const ac = alertColor(event, severity);
    const link = alertLink(props);
    const titleHtml = link
      ? `<a href="${link}" target="_blank" rel="noopener" class="alert-link">I'm under ${article} ${event}</a>`
      : `I'm under ${article} ${event}`;
    return `
      <div class="alert-banner show" style="margin-bottom:16px;--ac:${ac};">
        <div class="alert-icon">${alertIcon(event, severity)}</div>
        <div style="min-width:0;">
          <div class="alert-title">${titleHtml}</div>
          <div class="alert-body">${(props.headline || props.description || '').split('.')[0]}.</div>
        </div>
      </div>`;
  }).join('');

  lucide.createIcons({ scope: container });
  if (playSound) playAlertTone();
}

function activateDemoMode() {
  const btn = document.getElementById('demo-toggle');
  btn.style.display = 'flex';
  toggleDemoPanel();
}

function toggleDemoPanel() {
  document.getElementById('demo-panel').classList.toggle('open');
}

function addDemoAlert() {
  const val = document.getElementById('demoAlertSelect').value;
  const [event, severity] = val.split('|');
  const now = new Date();
  const end = new Date(now.getTime() + 6 * 3600000);
  demoAlerts.push({
    properties: {
      event,
      severity,
      headline: `${event} in effect`,
      description: `This is a demo alert for testing purposes. Event: ${event}. Severity: ${severity}.`,
      onset: now.toISOString(),
      expires: end.toISOString(),
      areaDesc: 'Demo County, Test State',
    }
  });
  renderAlerts([...lastRealAlerts, ...demoAlerts]);
}

function clearDemoAlerts() {
  demoAlerts = [];
  renderAlerts(lastRealAlerts);
}

function showWeatherError(msg) {
  document.getElementById('weather-content').innerHTML = `
    <div class="weather-error">
      <span class="weather-error-icon">📡</span>
      <span>${msg}</span>
    </div>`;
}

/* ════════════════════════════════════
   CONDITION THEMING (ported from Silver Skies)
════════════════════════════════════ */
const CONDITION_THEMES = {
  clear_day:      [255, 200,  60],   // warm gold
  clear_night:    [ 80, 120, 220],   // deep blue
  partly_cloudy:  [100, 180, 255],   // sky blue
  overcast:       [140, 150, 170],   // cool grey-blue
  fog:            [160, 160, 180],   // muted lavender-grey
  drizzle:        [ 80, 160, 220],   // steel blue
  rain:           [ 60, 130, 210],   // rain blue
  heavy_rain:     [ 40, 100, 180],   // deep rain
  snow:           [180, 220, 255],   // ice blue
  thunderstorm:   [138, 100, 255],   // purple
  hot:            [255, 120,  40],   // orange heat
  windy:          [100, 200, 180],   // teal
};

function conditionThemeKey(code, isDay) {
  if ([95,96,99].includes(code)) return 'thunderstorm';
  if ([71,73,75,77,85,86].includes(code)) return 'snow';
  if ([65,82].includes(code)) return 'heavy_rain';
  if ([61,63,80,81].includes(code)) return 'rain';
  if ([51,53,55].includes(code)) return 'drizzle';
  if ([45,48].includes(code)) return 'fog';
  if (code === 3) return 'overcast';
  if ([1,2].includes(code)) return 'partly_cloudy';
  if (code === 0) return isDay ? 'clear_day' : 'clear_night';
  return isDay ? 'clear_day' : 'clear_night';
}

function applyTheme(code, isDay) {
  const key = conditionThemeKey(code, isDay);
  let [r, g, b] = CONDITION_THEMES[key] || CONDITION_THEMES.clear_day;
  // In light mode, darken very bright accents so they stay readable
  if (window.matchMedia('(prefers-color-scheme: light)').matches) {
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    if (brightness > 160) {
      const scale = 130 / brightness;
      r = Math.round(r * scale);
      g = Math.round(g * scale);
      b = Math.round(b * scale);
    }
  }
  document.documentElement.style.setProperty('--a0', `${r},${g},${b}`);
}

async function initWeather() {
  // Location data obfuscated — decoded at runtime
  const _k = 'lni-wx-loc-2026';
  const _d = a => parseFloat(a.map((c,i) => String.fromCharCode(c ^ _k.charCodeAt(i % _k.length))).join(''));
  const lat = _d([95,92,71,21,68,76,29,92,95]);
  const lon = _d([65,95,89,20,89,79,29,91,89,83,29]);
  try {
    const [data, alerts] = await Promise.all([
      fetchWeather(lat, lon),
      fetchNWSAlerts(lat, lon),
    ]);
    renderWeather(data);
    applyTheme(data.current.weather_code, isDay());
    lastRealAlerts = alerts;
    // Seed known IDs on first load — no sound for existing alerts
    alerts.forEach(a => {
      const id = a.properties && (a.properties['@id'] || a.id);
      if (id) knownAlertIds.add(id);
    });
    renderAlerts([...lastRealAlerts, ...demoAlerts]);

    // refresh every 10 min
    setInterval(async () => {
      const fresh = await fetchWeather(lat, lon);
      renderWeather(fresh);
      applyTheme(fresh.current.weather_code, isDay());
      const freshAlerts = await fetchNWSAlerts(lat, lon);
      // Detect genuinely new alerts (ids we haven't seen before)
      const newIds = freshAlerts
        .map(a => a.properties && (a.properties['@id'] || a.id))
        .filter(Boolean);
      const hasNew = newIds.some(id => !knownAlertIds.has(id));
      newIds.forEach(id => knownAlertIds.add(id));
      lastRealAlerts = freshAlerts;
      renderAlerts([...lastRealAlerts, ...demoAlerts], hasNew);
    }, 600000);

  } catch (e) {
    showWeatherError('Weather unavailable');
    console.error(e);
  }
}

/* ════════════════════════════════════
   BACKGROUND IMAGE LOADER
════════════════════════════════════ */
function initBackground() {
  const layer = document.getElementById('bg-layer');
  const isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  const img = document.getElementById(isLight ? 'bg-light' : 'bg-dark');

  function applyBg(imgEl) {
    layer.style.backgroundImage = `url('${imgEl.src}')`;
    layer.classList.add('loaded');
  }

  if (img.complete) applyBg(img);
  else img.addEventListener('load', () => applyBg(img));

  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
    const next = document.getElementById(e.matches ? 'bg-light' : 'bg-dark');
    applyBg(next);
  });
}

initBackground();

initWeather();
</script>
